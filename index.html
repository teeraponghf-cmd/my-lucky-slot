<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NONGNUCH 888+ - Withdraw System</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #ffcf40; --red: #ff4444; --bg: #050505; --purple: #8a2be2; --neon-blue: #00f2ff; --green: #2ecc71;
        }
        * { box-sizing: border-box; font-family: 'Montserrat', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { 
            background: var(--bg); color: white; display: flex; flex-direction: column; align-items: center; 
            min-height: 100vh; margin: 0; padding: 10px; touch-action: manipulation; transition: 0.5s; 
        }
        body.freespin-mode { background: radial-gradient(circle, #200040, #050505); }

        /* Dashboard */
        .header { width: 100%; max-width: 400px; display: flex; gap: 8px; margin-bottom: 10px; }
        .stat-box { 
            background: rgba(255,255,255,0.05); flex: 1; padding: 12px; border-radius: 15px; 
            text-align: center; border: 1px solid rgba(255,215,0,0.2); position: relative;
        }
        .stat-label { font-size: 0.65rem; color: #888; text-transform: uppercase; }
        .stat-val { font-size: 1.2rem; font-weight: 900; color: var(--gold); }
        
        /* ปุ่มจัดการเงิน */
        .money-controls { position: absolute; right: 5px; top: 50%; transform: translateY(-50%); display: flex; flex-direction: column; gap: 4px; }
        .btn-money { 
            border: none; border-radius: 4px; width: 22px; height: 20px; 
            font-weight: bold; font-size: 14px; cursor: pointer; display: flex; align-items: center; justify-content: center;
        }
        .btn-plus { background: var(--gold); color: #000; box-shadow: 0 0 5px var(--gold); }
        .btn-minus { background: var(--red); color: #fff; box-shadow: 0 0 5px var(--red); }

        /* Slot Machine Area */
        .slot-wrapper { 
            background: #111; padding: 15px; border-radius: 25px; border: 4px solid var(--gold); 
            width: 100%; max-width: 360px; box-shadow: 0 0 30px rgba(255, 207, 64, 0.2); transition: 0.3s;
        }
        .matrix-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; background: #000; padding: 10px; border-radius: 15px; margin-bottom: 15px; }
        .cell { 
            background: linear-gradient(180deg, #fff 0%, #bbb 100%); aspect-ratio: 1/1; 
            border-radius: 10px; display: flex; align-items: center; justify-content: center; 
            font-size: 40px; color: #000;
        }
        .cell.win { background: var(--neon-blue); box-shadow: 0 0 20px var(--neon-blue); animation: win-pulse 0.4s infinite alternate; }

        /* Controls */
        .bet-row { display: flex; justify-content: center; gap: 8px; margin-bottom: 15px; }
        .bet-btn { background: #222; color: #777; border: 2px solid #333; padding: 10px 15px; border-radius: 20px; font-weight: 900; cursor: pointer; }
        .bet-btn.active { background: var(--gold); color: #000; border-color: #fff; }
        
        #spinBtn { width: 100%; padding: 20px; border-radius: 50px; border: none; background: linear-gradient(to bottom, #ff5555, #aa0000); color: white; font-size: 1.6rem; font-weight: 900; box-shadow: 0 6px 0 #700; cursor: pointer; }
        #spinBtn:disabled { background: #444; box-shadow: none; color: #888; transform: none; }

        /* Modal */
        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.9); display: none; justify-content: center; align-items: center; z-index: 100; backdrop-filter: blur(8px); }
        .modal { background: #1a1a1a; width: 90%; max-width: 320px; padding: 25px; border-radius: 25px; border: 2px solid var(--gold); text-align: center; }
        
        #msg { text-align: center; font-weight: 900; font-size: 1.2rem; min-height: 35px; margin-top: 15px; color: var(--gold); }
        
        @keyframes win-pulse { to { transform: scale(1.1); } }
    </style>
</head>
<body>

    <h2 id="titleText" style="color:var(--gold); margin: 10px 0; letter-spacing: 2px;">NONGNUCH 888+</h2>

    <div class="header">
        <div class="stat-box">
            <span class="stat-label">เครดิตคงเหลือ</span><br>
            <span class="stat-val" id="balDisp">1,000</span>
            <div class="money-controls">
                <button class="btn-money btn-plus" onclick="openTopup()">+</button>
                <button class="btn-money btn-minus" onclick="openWithdraw()">-</button>
            </div>
        </div>
        <div class="stat-box">
            <span class="stat-label">แจ็คพอตสะสม</span><br>
            <span class="stat-val" id="jackDisp">5,000</span>
        </div>
    </div>

    <div class="slot-wrapper" id="wrapper">
        <div class="matrix-grid" id="grid"></div>
        <div class="bet-row">
            <button class="bet-btn" onclick="setBet(10, 1.0, 0.05, this)">10</button>
            <button class="bet-btn active" onclick="setBet(50, 1.5, 0.10, this)">50</button>
            <button class="bet-btn" onclick="setBet(100, 2.5, 0.15, this)">100</button>
        </div>
        <button id="spinBtn" onclick="handleSpin()">SPIN</button>
    </div>

    <div id="msg"></div>

    <div class="overlay" id="topupModal">
        <div class="modal">
            <h3 style="color:var(--gold)">💰 เติมเครดิต</h3>
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px; margin:20px 0;">
                <button style="padding:15px; border-radius:10px; background:#333; color:white; border:none;" onclick="addMoney(100)">100</button>
                <button style="padding:15px; border-radius:10px; background:#333; color:white; border:none;" onclick="addMoney(500)">500</button>
                <button style="padding:15px; border-radius:10px; background:#333; color:white; border:none;" onclick="addMoney(1000)">1000</button>
                <button style="padding:15px; border-radius:10px; background:#333; color:white; border:none;" onclick="addMoney(5000)">5000</button>
            </div>
            <p onclick="closeModal()" style="color:#666; cursor:pointer;">ปิด</p>
        </div>
    </div>

    <div class="overlay" id="withdrawModal">
        <div class="modal">
            <h3 style="color:var(--red)">💸 ถอนเครดิต</h3>
            <p style="font-size:0.8rem; color:#888;">กรุณาระบุจำนวนที่จะถอน (จำลอง)</p>
            <input type="number" id="withdrawInput" style="width:100%; padding:15px; border-radius:10px; border:none; margin:10px 0; font-size:1.2rem; text-align:center;" placeholder="ใส่จำนวนเงิน">
            <button style="width:100%; padding:15px; border-radius:10px; background:var(--green); color:white; border:none; font-weight:bold;" onclick="processWithdraw()">ยืนยันการถอน</button>
            <p onclick="closeModal()" style="color:#666; cursor:pointer; margin-top:15px;">ยกเลิก</p>
        </div>
    </div>

    <script>
        let audioCtx = null;
        function initAudio() { if(!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)(); if(audioCtx.state === 'suspended') audioCtx.resume(); }
        function playSnd(f, d, v=0.1) { if(!audioCtx) return; const o=audioCtx.createOscillator(), g=audioCtx.createGain(); o.frequency.value=f; g.gain.setValueAtTime(v, audioCtx.currentTime); o.connect(g); g.connect(audioCtx.destination); o.start(); o.stop(audioCtx.currentTime+d); }

        const config = [{s:'🍒',m:5,w:40},{s:'🍋',m:12,w:22},{s:'🍉',m:25,w:15},{s:'💎',m:100,w:10},{s:'7️⃣',m:500,w:5},{s:'🌟',m:0,w:8}];
        const paylines = [[0,1,2],[3,4,5],[6,7,8],[0,4,8],[2,4,6]];
        
        let balance = parseInt(localStorage.getItem('mx_bal_w')) || 1000;
        let jackpot = parseInt(localStorage.getItem('mx_jack_w')) || 5000;
        let currentBet = 50, betBonus = 1.5, jackRate = 0.10;

        const cellEls = [];
        const grid = document.getElementById('grid');
        for(let i=0; i<9; i++) {
            const c = document.createElement('div');
            c.className = 'cell'; c.innerText = '💎';
            grid.appendChild(c); cellEls.push(c);
        }

        function updateUI() {
            document.getElementById('balDisp').innerText = Math.floor(balance).toLocaleString();
            document.getElementById('jackDisp').innerText = Math.floor(jackpot).toLocaleString();
            localStorage.setItem('mx_bal_w', balance); localStorage.setItem('mx_jack_w', jackpot);
        }

        function setBet(v, b, j, btn) {
            initAudio(); currentBet = v; betBonus = b; jackRate = j;
            document.querySelectorAll('.bet-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active'); playSnd(440, 0.05);
        }

        async function handleSpin() {
            initAudio();
            if(balance < currentBet) { openTopup(); return; }
            balance -= currentBet; jackpot += (currentBet * jackRate);
            updateUI();
            
            const btn = document.getElementById('spinBtn');
            btn.disabled = true;
            document.getElementById('msg').innerText = "";
            cellEls.forEach(c => c.className = 'cell');

            for(let i=0; i<18; i++) {
                cellEls.forEach(c => c.innerText = config[Math.floor(Math.random()*6)].s);
                playSnd(200 + (i*15), 0.04, 0.05);
                await new Promise(r => setTimeout(r, 60));
            }

            const res = [];
            for(let i=0; i<9; i++) {
                const rand = Math.random() * 100;
                let sum = 0, pick = config[0];
                for(let s of config) { sum += s.w; if(rand <= sum) { pick = s; break; } }
                res.push(pick); cellEls[i].innerText = pick.s;
            }

            let winSum = 0;
            paylines.forEach(line => {
                if(res[line[0]].s === res[line[1]].s && res[line[1]].s === res[line[2]].s && res[line[0]].s !== '🌟') {
                    line.forEach(idx => cellEls[idx].classList.add('win'));
                    winSum += ((currentBet / 5) * res[line[0]].m) * betBonus;
                }
            });

            if(winSum > 0) {
                balance += winSum;
                document.getElementById('msg').innerText = "WIN: +" + Math.floor(winSum).toLocaleString();
                playSnd(600, 0.3);
            }
            btn.disabled = false; updateUI();
        }

        // ระบบการเงิน
        function openTopup() { document.getElementById('topupModal').style.display='flex'; initAudio(); }
        function openWithdraw() { document.getElementById('withdrawModal').style.display='flex'; initAudio(); }
        function closeModal() { document.querySelectorAll('.overlay').forEach(o => o.style.display='none'); }

        function addMoney(v) {
            balance += v; updateUI(); closeModal(); playSnd(1200, 0.2);
        }

        function processWithdraw() {
            const amt = parseInt(document.getElementById('withdrawInput').value);
            if(!amt || amt <= 0) { alert("กรุณาใส่จำนวนเงินที่ถูกต้อง"); return; }
            if(amt > balance) { alert("ยอดเงินไม่พอถอนครับ!"); return; }

            balance -= amt;
            updateUI();
            alert("💸 ถอนเงินสำเร็จ! จำนวน " + amt.toLocaleString() + " บาท (จำลองการโอนเข้าบัญชี)");
            closeModal();
            playSnd(150, 0.5); // เสียงถอนเงินทุ้มๆ
        }

        updateUI();
    </script>
</body>
</html>
